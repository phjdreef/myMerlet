name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            platform: darwin
            arch: x64
            artifact_name: macOS-Intel
          - os: macos-15
            platform: darwin
            arch: arm64
            artifact_name: macOS-AppleSilicon
          - os: windows-latest
            platform: win32
            artifact_name: Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        if: matrix.platform == 'darwin'
        run: npm run make:${{ matrix.arch }}

      - name: Build and package
        if: matrix.platform == 'win32'
        run: npm run make

      - name: Validate macOS artifacts
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail

          echo "Validating macOS artifacts for arch=${{ matrix.arch }}"

          if [[ ! -d out/make ]]; then
            echo "Expected out/make directory but it does not exist."
            exit 1
          fi

          dmg_count="$(find out/make -type f -name "*.dmg" | wc -l | tr -d ' ')"
          if [[ "$dmg_count" -gt 0 ]]; then
            echo "Found $dmg_count .dmg artifact(s)."
          else
            echo "No .dmg artifacts found (allowed when no DMG maker is configured)."
          fi

          zip_file="$(find out/make -type f -name "*.zip" | while IFS= read -r file; do
            if [[ "$file" == *"/darwin/${{ matrix.arch }}/"* ]]; then
              echo "$file"
              break
            fi
          done)"

          if [[ -z "$zip_file" ]]; then
            echo "No macOS zip found for darwin/${{ matrix.arch }}"
            find out/make -type f -name "*.zip" | sort
            exit 1
          fi

          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT

          ditto -xk "$zip_file" "$temp_dir"

          app_binary="$(find "$temp_dir" -type f -path "*.app/Contents/MacOS/*" | head -n 1 || true)"
          if [[ -z "$app_binary" ]]; then
            echo "No app binary found in extracted zip: $zip_file"
            find "$temp_dir" -maxdepth 5 -type f | sort
            exit 1
          fi

          binary_archs="$(lipo -archs "$app_binary")"
          expected_arch="x86_64"
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            expected_arch="arm64"
          fi

          echo "Binary architectures: $binary_archs"
          if [[ "$binary_archs" != *"$expected_arch"* ]]; then
            echo "Binary architecture check failed. Expected: $expected_arch"
            echo "Binary: $app_binary"
            exit 1
          fi

          echo "macOS artifact validation passed."

      - name: Validate Windows artifacts
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          if (-not (Test-Path 'out/make')) {
            throw 'Expected out/make directory but it does not exist.'
          }

          $exeArtifacts = @(Get-ChildItem -Path out/make -Recurse -Filter *.exe)
          if ($exeArtifacts.Count -eq 0) {
            throw 'No .exe artifacts found under out/make.'
          }

          Write-Host "Found $($exeArtifacts.Count) EXE artifact(s)."

          $msiArtifacts = @(Get-ChildItem -Path out/make -Recurse -Filter *.msi)
          if ($msiArtifacts.Count -gt 0) {
            Write-Host "Found $($msiArtifacts.Count) MSI artifact(s)."
          } else {
            Write-Host 'No MSI artifacts found (allowed when maker does not produce MSI).'
          }

      - name: Upload macOS artifacts
        if: matrix.platform == 'darwin'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip

      - name: Upload Windows artifacts
        if: matrix.platform == 'win32'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            out/make/**/*.exe
            out/make/**/*.msi

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
